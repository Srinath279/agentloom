{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.13.0",
    "install": {
      "grafana": {
        "pkg-path": "grafana"
      },
      "prometheus": {
        "pkg-path": "prometheus"
      },
      "python3": {
        "pkg-path": "python3",
        "version": ">=3.10"
      },
      "temporal-cli": {
        "pkg-path": "temporal-cli"
      }
    },
    "vars": {
      "LANGFUSE_HOST": "http://localhost:3001",
      "LANGFUSE_PUBLIC_KEY": "pk-lf-agentloom-local",
      "LANGFUSE_SECRET_KEY": "sk-lf-agentloom-local"
    },
    "hook": {
      "on-activate": "  # Autogenerated by Flox\n\n  # Load project secrets (ANTHROPIC_API_KEY, etc.) from .env, if present, so\n  # they're part of the activated environment that `flox services start`\n  # (including the `worker` service) inherits. .env is gitignored — this is\n  # the only place its values get sourced, since worker.py has no dotenv call.\n  if [ -f \"$FLOX_ENV_PROJECT/.env\" ]; then\n    set -a\n    source \"$FLOX_ENV_PROJECT/.env\"\n    set +a\n  fi\n\n  # Set up a Python virtual environment\n\n  export PYTHON_DIR=\"$FLOX_ENV_CACHE/python\"\n  if [ ! -d \"$PYTHON_DIR\" ]; then\n    echo \"Creating python virtual environment in $PYTHON_DIR\"\n    python -m venv \"$PYTHON_DIR\"\n  fi\n\n  # Quietly activate venv and install packages in a subshell so\n  # that the venv can be freshly activated in the profile section.\n  (\n    source \"$PYTHON_DIR/bin/activate\"\n    # install the dependencies for this project based on pyproject.toml\n    # <https://pip.pypa.io/en/stable/cli/pip_install/>\n    pip install -e . --quiet\n  )\n\n  # End autogenerated by Flox\n"
    },
    "profile": {
      "bash": "  # Autogenerated by Flox\n\n  echo \"Activating python virtual environment\" >&2\n  source \"$PYTHON_DIR/bin/activate\"\n\n  # End autogenerated by Flox\n",
      "zsh": "  # Autogenerated by Flox\n\n  echo \"Activating python virtual environment\" >&2\n  source \"$PYTHON_DIR/bin/activate\"\n\n  # End autogenerated by Flox\n",
      "fish": "  # Autogenerated by Flox\n\n  echo \"Activating python virtual environment\" >&2\n  source \"$PYTHON_DIR/bin/activate.fish\"\n\n  # End autogenerated by Flox\n",
      "tcsh": "  # Autogenerated by Flox\n\n  echo \"Activating python virtual environment\" >&2\n  source \"$PYTHON_DIR/bin/activate.csh\"\n\n  # End autogenerated by Flox\n"
    },
    "options": {},
    "services": {
      "grafana": {
        "command": "  mkdir -p \"$FLOX_ENV_CACHE/grafana/data\" \"$FLOX_ENV_CACHE/grafana/logs\" \"$FLOX_ENV_CACHE/grafana/plugins\"\n  export GF_PATHS_DATA=\"$FLOX_ENV_CACHE/grafana/data\"\n  export GF_PATHS_LOGS=\"$FLOX_ENV_CACHE/grafana/logs\"\n  export GF_PATHS_PLUGINS=\"$FLOX_ENV_CACHE/grafana/plugins\"\n  export GF_PATHS_PROVISIONING=\"$FLOX_ENV_PROJECT/observability/grafana/provisioning\"\n  export AGENTLOOM_DASHBOARDS_DIR=\"$FLOX_ENV_PROJECT/observability/grafana/dashboards\"\n  export GF_AUTH_ANONYMOUS_ENABLED=true\n  export GF_AUTH_ANONYMOUS_ORG_ROLE=Admin\n  exec grafana server --homepath \"$FLOX_ENV/share/grafana\"\n"
      },
      "langfuse": {
        "command": "  exec docker compose -f \"$FLOX_ENV_PROJECT/observability/langfuse/docker-compose.yml\" up\n"
      },
      "prometheus": {
        "command": "  mkdir -p \"$FLOX_ENV_CACHE/prometheus-data\"\n  exec prometheus --config.file=\"$FLOX_ENV_PROJECT/observability/prometheus.yml\" --storage.tsdb.path=\"$FLOX_ENV_CACHE/prometheus-data\" --web.listen-address=localhost:9090\n"
      },
      "temporal": {
        "command": "  exec temporal server start-dev --metrics-port 9091 --db-filename \"$FLOX_ENV_CACHE/temporal.db\"\n"
      },
      "worker": {
        "command": "  cd \"$FLOX_ENV_PROJECT\"\n  until temporal operator cluster health --address localhost:7233 >/dev/null 2>&1; do\n    sleep 1\n  done\n  exec \"$PYTHON_DIR/bin/python\" worker.py\n"
      }
    }
  },
