schema-version = "1.13.0"


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
[install]
python3.pkg-path = "python3"
python3.version = ">=3.10"
temporal-cli.pkg-path = "temporal-cli"
grafana.pkg-path = "grafana"
prometheus.pkg-path = "prometheus"


## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
# Langfuse (local docker-compose stack, web UI on :3001).
# Local-dev keys seeded via observability/langfuse/.env — not real secrets.
LANGFUSE_HOST = "http://localhost:3001"
LANGFUSE_PUBLIC_KEY = "pk-lf-agentloom-local"
LANGFUSE_SECRET_KEY = "sk-lf-agentloom-local"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
on-activate = """
  # Autogenerated by Flox

  # Load project secrets (ANTHROPIC_API_KEY, etc.) from .env, if present, so
  # they're part of the activated environment that `flox services start`
  # (including the `worker` service) inherits. .env is gitignored — this is
  # the only place its values get sourced, since worker.py has no dotenv call.
  if [ -f "$FLOX_ENV_PROJECT/.env" ]; then
    set -a
    source "$FLOX_ENV_PROJECT/.env"
    set +a
  fi

  # Set up a Python virtual environment

  export PYTHON_DIR="$FLOX_ENV_CACHE/python"
  if [ ! -d "$PYTHON_DIR" ]; then
    echo "Creating python virtual environment in $PYTHON_DIR"
    python -m venv "$PYTHON_DIR"
  fi

  # Quietly activate venv and install packages in a subshell so
  # that the venv can be freshly activated in the profile section.
  (
    source "$PYTHON_DIR/bin/activate"
    # install the dependencies for this project based on pyproject.toml
    # <https://pip.pypa.io/en/stable/cli/pip_install/>
    pip install -e . --quiet
  )

  # End autogenerated by Flox
"""


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
bash = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate"

  # End autogenerated by Flox
"""
fish = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate.fish"

  # End autogenerated by Flox
"""
tcsh = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate.csh"

  # End autogenerated by Flox
"""
zsh = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate"

  # End autogenerated by Flox
"""


## Services ---------------------------------------------------------
##  $ flox services start             <- Starts all services
##  $ flox services status            <- Status of running services
##  $ flox activate --start-services  <- Activates & starts all
## ------------------------------------------------------------------
[services]

# Temporal dev server: gRPC :7233, Web UI :8233, Prometheus metrics :9091
[services.temporal]
command = """
  exec temporal server start-dev \
    --metrics-port 9091 \
    --db-filename "$FLOX_ENV_CACHE/temporal.db"
"""

# AgentLoom worker: exposes Temporal SDK metrics on :9464 (see worker.py)
[services.worker]
command = """
  cd "$FLOX_ENV_PROJECT"
  until temporal operator cluster health --address localhost:7233 >/dev/null 2>&1; do
    sleep 1
  done
  exec "$PYTHON_DIR/bin/python" worker.py
"""

# Prometheus: scrapes temporal-server + worker, serves on :9090
[services.prometheus]
command = """
  mkdir -p "$FLOX_ENV_CACHE/prometheus-data"
  exec prometheus \
    --config.file="$FLOX_ENV_PROJECT/observability/prometheus.yml" \
    --storage.tsdb.path="$FLOX_ENV_CACHE/prometheus-data" \
    --web.listen-address=localhost:9090
"""

# Langfuse: LLM tracing UI on :3001 (requires Docker Desktop to be running)
[services.langfuse]
command = """
  exec docker compose -f "$FLOX_ENV_PROJECT/observability/langfuse/docker-compose.yml" up
"""

# Grafana: dashboards on :3000, auto-provisioned datasource + Temporal dashboards
[services.grafana]
command = """
  mkdir -p "$FLOX_ENV_CACHE/grafana/data" "$FLOX_ENV_CACHE/grafana/logs" "$FLOX_ENV_CACHE/grafana/plugins"
  export GF_PATHS_DATA="$FLOX_ENV_CACHE/grafana/data"
  export GF_PATHS_LOGS="$FLOX_ENV_CACHE/grafana/logs"
  export GF_PATHS_PLUGINS="$FLOX_ENV_CACHE/grafana/plugins"
  export GF_PATHS_PROVISIONING="$FLOX_ENV_PROJECT/observability/grafana/provisioning"
  export AGENTLOOM_DASHBOARDS_DIR="$FLOX_ENV_PROJECT/observability/grafana/dashboards"
  export GF_AUTH_ANONYMOUS_ENABLED=true
  export GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
  exec grafana server --homepath "$FLOX_ENV/share/grafana"
"""


