apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentloom-worker
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: worker
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
