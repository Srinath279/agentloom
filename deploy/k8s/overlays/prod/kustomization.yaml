apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod: multiple replicas polling the same task queue (Temporal distributes
# activities across them), pinned image tag, PodDisruptionBudget.
#   kubectl apply -k deploy/k8s/overlays/prod

namespace: agentloom-prod

resources:
  - namespace.yaml
  - pdb.yaml
  - ../../base

patches:
  - path: worker-patch.yaml

configMapGenerator:
  - name: agentloom-config
    behavior: merge
    literals:
      # Prod Temporal — self-hosted frontend or Temporal Cloud
      # (<ns>.<account>.tmprl.cloud:7233; mTLS setup required for Cloud).
      - TEMPORAL_ADDRESS=temporal-frontend.temporal.svc.cluster.local:7233
      - TEMPORAL_NAMESPACE=agentloom-prod

images:
  - name: agentloom-worker
    # Pin to an immutable tag/digest in real deployments; CI should update this.
    newTag: v0.1.0
