apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/name: agentloom
      app.kubernetes.io/component: worker
    includeSelectors: true

resources:
  - worker-deployment.yaml
  - worker-metrics-service.yaml
  - configmap.yaml

# Secrets are NOT in the base — create per environment (see overlays and
# secret.example.yaml):
#   kubectl create secret generic agentloom-secrets \
#     --from-literal=OPENROUTER_API_KEY=sk-or-v1-...
