server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: ${FLOX_ENV_CACHE}/promtail/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: agentloom-worker
    static_configs:
      - targets: [localhost]
        labels:
          job: agentloom-worker
          service: worker
          __path__: ${FLOX_ENV_CACHE}/worker.log
